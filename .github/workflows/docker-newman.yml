name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container (detached)
        run: |
          docker run -d --rm \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/iot-ingestion:lab04

      - name: Wait for service health
        run: npx wait-on http-get://localhost:8000/health --timeout 30000

      - name: Verify /health endpoint
        run: curl -sf http://localhost:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag fit4110/iot-ingestion:lab04 ghcr.io/${OWNER}/iot-ingestion:v0.1.0-team-iot
          docker tag fit4110/iot-ingestion:lab04 ghcr.io/${OWNER}/iot-ingestion:lab04
          docker push ghcr.io/${OWNER}/iot-ingestion:v0.1.0-team-iot
          docker push ghcr.io/${OWNER}/iot-ingestion:lab04
